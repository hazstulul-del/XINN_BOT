<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XINN AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <b>XINN AI</b>
      <button id="closeSide">×</button>
    </div>

    <button id="newChat" class="new-chat">+ Chat Baru</button>
    <input id="searchHistory" class="search" placeholder="Cari chat...">
    <div id="historyList" class="history"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button id="menuBtn" class="top-btn">☰</button>
      <h1>XINN AI</h1>

      <div class="top-actions">
        <button id="themeBtn" class="top-btn">🌙</button>
        <button id="panelBtn" class="top-btn">◨</button>
      </div>
    </header>

    <section id="chatArea" class="chat-area"></section>

    <section class="bottom">
      <div class="tools">
        <button id="thinkBtn">🧠 Deep Think (R1)</button>
        <button id="searchBtn">🌐 Search</button>
      </div>

      <div class="input-box">
        <button id="plusBtn" class="plus">+</button>

        <div id="uploadMenu" class="upload-menu">
          <button id="photoBtn">🖼️ Foto</button>
          <button id="cameraBtn">📷 Kamera</button>
          <button id="docBtn">📄 Dokumen</button>
        </div>

        <input id="photoInput" type="file" hidden multiple accept="image/*">
        <input id="cameraInput" type="file" hidden accept="image/*" capture="environment">
        <input id="docInput" type="file" hidden multiple accept=".pdf,.doc,.docx,.txt,.zip,.rar,.js,.html,.css,.json">

        <textarea id="messageInput" placeholder="Kirim pesan ke XINN AI..."></textarea>
        <button id="sendBtn" class="send">➜</button>
      </div>

      <p>XINN AI bisa membuat kesalahan. Periksa info penting.</p>
    </section>
  </main>

  <aside id="rightPanel" class="right-panel hide">
    <div class="panel-head">
      <b>Preview</b>
      <button id="closePanel">×</button>
    </div>
    <pre><code>console.log("XINN AI Ready");</code></pre>
  </aside>
</div>

<script src="script.js"></script>
</body>
</html>
